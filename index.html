<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>台股選股系統</title>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg:        #0d0f14;
  --bg2:       #141720;
  --bg3:       #1c2030;
  --border:    #252a3a;
  --accent:    #00c896;
  --accent2:   #4f8ef7;
  --red:       #f05050;
  --gold:      #f0b840;
  --text:      #e8eaf0;
  --text2:     #8892aa;
  --text3:     #55607a;
  --up:        #26a69a;
  --down:      #ef5350;
  --radius:    8px;
  --font:      'Noto Sans TC', sans-serif;
  --mono:      'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
}

/* ── Top bar ── */
.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-logo {
  font-family: var(--mono);
  font-weight: 600;
  font-size: 16px;
  color: var(--accent);
  letter-spacing: 2px;
}
.topbar-nav a {
  color: var(--text2);
  text-decoration: none;
  margin-left: 24px;
  font-size: 14px;
  transition: color .2s;
}
.topbar-nav a:hover, .topbar-nav a.active { color: var(--accent); }
.updated-tag {
  font-size: 12px;
  color: var(--text3);
  font-family: var(--mono);
}

/* ── Layout ── */
.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: calc(100vh - 56px);
}

/* ── Sidebar ── */
.sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 20px 16px;
  overflow-y: auto;
  height: calc(100vh - 56px);
  position: sticky;
  top: 56px;
}
.sidebar-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.filter-group {
  margin-bottom: 20px;
}
.filter-group-label {
  font-size: 12px;
  color: var(--text2);
  font-weight: 500;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-group-label::before {
  content: '';
  width: 3px;
  height: 12px;
  background: var(--accent2);
  border-radius: 2px;
  display: block;
}
.filter-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background .15s;
  margin-bottom: 2px;
}
.filter-item:hover { background: var(--bg3); }
.filter-item input[type=checkbox] {
  accent-color: var(--accent);
  width: 14px;
  height: 14px;
  cursor: pointer;
}
.filter-item label {
  font-size: 13px;
  cursor: pointer;
  flex: 1;
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 12px 0;
}

.reset-btn {
  width: 100%;
  padding: 8px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text2);
  font-size: 13px;
  font-family: var(--font);
  cursor: pointer;
  transition: all .2s;
  margin-top: 4px;
}
.reset-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ── Main area ── */
.main {
  padding: 24px;
  overflow-y: auto;
}
.main-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.result-count {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text2);
}
.result-count span {
  color: var(--accent);
  font-size: 22px;
  font-weight: 600;
}
.sort-bar {
  display: flex;
  gap: 8px;
  align-items: center;
}
.sort-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  font-size: 12px;
  padding: 5px 10px;
  cursor: pointer;
  font-family: var(--font);
  transition: all .15s;
}
.sort-btn.active, .sort-btn:hover {
  border-color: var(--accent2);
  color: var(--accent2);
}

/* ── Stock grid ── */
.stock-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

.stock-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color .2s, transform .15s;
  cursor: pointer;
}
.stock-card:hover {
  border-color: var(--accent2);
  transform: translateY(-2px);
}
.card-header {
  padding: 12px 14px 8px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.card-symbol {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 600;
  color: var(--accent2);
}
.card-name {
  font-size: 12px;
  color: var(--text2);
  margin-top: 2px;
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.card-price {
  text-align: right;
}
.card-close {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 600;
}
.card-change {
  font-size: 12px;
  font-family: var(--mono);
  margin-top: 2px;
}
.up   { color: var(--up); }
.down { color: var(--down); }
.flat { color: var(--text2); }

.card-chart {
  height: 120px;
  padding: 0 4px;
}

.card-flags {
  padding: 8px 14px 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.flag-tag {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 4px;
  font-weight: 500;
}
.flag-bull { background: rgba(0,200,150,.15); color: var(--accent); }
.flag-bear { background: rgba(240,80,80,.15);  color: var(--red); }
.flag-info { background: rgba(79,142,247,.12); color: var(--accent2); }

/* ── Modal ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 200;
  backdrop-filter: blur(4px);
  justify-content: center;
  align-items: flex-start;
  padding: 40px 20px;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%;
  max-width: 900px;
  padding: 28px;
  position: relative;
  animation: fadeUp .25s ease;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}
.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  transition: all .15s;
}
.modal-close:hover { color: var(--text); border-color: var(--text2); }
.modal-title {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 20px;
}
.modal-symbol {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 600;
  color: var(--accent2);
}
.modal-name { font-size: 15px; color: var(--text2); }
.modal-chart { height: 420px; border-radius: 8px; overflow: hidden; }

.modal-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-top: 16px;
}
.stat-box {
  background: var(--bg3);
  border-radius: 8px;
  padding: 10px 14px;
}
.stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.stat-value { font-family: var(--mono); font-size: 15px; font-weight: 600; }

/* ── Empty state ── */
.empty {
  grid-column: 1/-1;
  text-align: center;
  padding: 80px 20px;
  color: var(--text3);
}
.empty svg { margin-bottom: 16px; opacity: .4; }
.empty p { font-size: 14px; }

/* ── Loading ── */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--text2);
  gap: 16px;
}
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Responsive ── */
@media(max-width:768px){
  .layout { grid-template-columns: 1fr; }
  .sidebar { height: auto; position: static; }
  .modal-stats { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">TWSTOCK</div>
  <nav class="topbar-nav">
    <a href="index.html" class="active">選股篩選</a>
    <a href="watchlist.html">自訂清單</a>
  </nav>
  <div class="updated-tag" id="updatedAt">載入中…</div>
</div>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-title">選股條件</div>

    <div class="filter-group">
      <div class="filter-group-label">均線條件</div>
      <label class="filter-item"><input type="checkbox" data-flag="above_ma20"><label>股價站上 MA20</label></label>
      <label class="filter-item"><input type="checkbox" data-flag="above_ma60"><label>股價站上 MA60</label></label>
      <label class="filter-item"><input type="checkbox" data-flag="ma5_above_ma20"><label>MA5 在 MA20 上方</label></label>
      <label class="filter-item"><input type="checkbox" data-flag="golden_cross"><label>黃金交叉（MA5↑MA20）</label></label>
      <label class="filter-item"><input type="checkbox" data-flag="death_cross"><label>死亡交叉（MA5↓MA20）</label></label>
    </div>

    <div class="filter-group">
      <div class="filter-group-label">RSI 超買超賣</div>
      <label class="filter-item"><input type="checkbox" data-flag="rsi_oversold"><label>RSI &lt; 30（超賣）</label></label>
      <label class="filter-item"><input type="checkbox" data-flag="rsi_overbought"><label>RSI &gt; 70（超買）</label></label>
    </div>

    <div class="filter-group">
      <div class="filter-group-label">MACD</div>
      <label class="filter-item"><input type="checkbox" data-flag="macd_bullish"><label>MACD 金叉（多頭）</label></label>
    </div>

    <div class="filter-group">
      <div class="filter-group-label">布林通道</div>
      <label class="filter-item"><input type="checkbox" data-flag="near_bb_upper"><label>接近布林上軌</label></label>
      <label class="filter-item"><input type="checkbox" data-flag="near_bb_lower"><label>接近布林下軌（反彈）</label></label>
    </div>

    <div class="filter-group">
      <div class="filter-group-label">成交量 / K 棒</div>
      <label class="filter-item"><input type="checkbox" data-flag="vol_surge"><label>爆量（1.5× 均量）</label></label>
      <label class="filter-item"><input type="checkbox" data-flag="bullish_candle"><label>今日收紅K</label></label>
      <label class="filter-item"><input type="checkbox" data-flag="new_high_20"><label>近50日新高</label></label>
      <label class="filter-item"><input type="checkbox" data-flag="new_low_20"><label>近50日新低</label></label>
    </div>

    <div class="divider"></div>
    <button class="reset-btn" id="resetBtn">清除所有條件</button>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="main-header">
      <div class="result-count">符合股票：<span id="matchCount">0</span> 檔</div>
      <div class="sort-bar">
        <span style="font-size:12px;color:var(--text3)">排序：</span>
        <button class="sort-btn active" data-sort="change_desc">漲幅↓</button>
        <button class="sort-btn" data-sort="change_asc">漲幅↑</button>
        <button class="sort-btn" data-sort="symbol">代碼</button>
      </div>
    </div>
    <div class="stock-grid" id="stockGrid">
      <div class="loading"><div class="spinner"></div><span>載入資料中…</span></div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-title">
      <span class="modal-symbol" id="mSymbol"></span>
      <span class="modal-name" id="mName"></span>
    </div>
    <div class="modal-chart" id="modalChart"></div>
    <div class="modal-stats" id="modalStats"></div>
  </div>
</div>

<script>
let allStocks = [];
let sortMode  = 'change_desc';
let miniCharts = {};

// ── 載入資料 ──────────────────────────────
async function loadData() {
  try {
    const res  = await fetch('data/stocks.json?t=' + Date.now());
    const data = await res.json();
    allStocks  = data.stocks || [];
    document.getElementById('updatedAt').textContent = '更新：' + (data.updated_at || '');
    renderCards();
  } catch(e) {
    document.getElementById('stockGrid').innerHTML =
      '<div class="empty"><p>⚠ 無法載入資料，請確認 data/stocks.json 是否存在</p></div>';
  }
}

// ── 取得勾選條件 ──────────────────────────
function getActiveFlags() {
  return [...document.querySelectorAll('.filter-item input[type=checkbox]:checked')]
    .map(cb => cb.dataset.flag);
}

// ── 過濾 ──────────────────────────────────
function filterStocks() {
  const flags = getActiveFlags();
  if (!flags.length) return allStocks;
  return allStocks.filter(s => flags.every(f => s.flags && s.flags[f]));
}

// ── 排序 ──────────────────────────────────
function sortStocks(list) {
  return [...list].sort((a, b) => {
    if (sortMode === 'change_desc') return (b.change_pct||0) - (a.change_pct||0);
    if (sortMode === 'change_asc')  return (a.change_pct||0) - (b.change_pct||0);
    if (sortMode === 'symbol')      return a.symbol.localeCompare(b.symbol);
    return 0;
  });
}

// ── 旗標標籤 ─────────────────────────────
const FLAG_LABELS = {
  above_ma20:    ['站上MA20','bull'],
  above_ma60:    ['站上MA60','bull'],
  ma5_above_ma20:['MA5>MA20','bull'],
  golden_cross:  ['黃金交叉','bull'],
  death_cross:   ['死亡交叉','bear'],
  rsi_oversold:  ['RSI超賣','info'],
  rsi_overbought:['RSI超買','bear'],
  macd_bullish:  ['MACD多頭','bull'],
  vol_surge:     ['爆量','info'],
  near_bb_upper: ['近布林上軌','bear'],
  near_bb_lower: ['近布林下軌','bull'],
  bullish_candle:['收紅K','bull'],
  new_high_20:   ['50日新高','bull'],
  new_low_20:    ['50日新低','bear'],
};

// ── 迷你 K 線圖 ──────────────────────────
function renderMiniChart(container, candles) {
  container.innerHTML = '';
  const chart = LightweightCharts.createChart(container, {
    width: container.clientWidth || 320,
    height: 120,
    layout: { background:{color:'transparent'}, textColor:'transparent' },
    grid: { vertLines:{visible:false}, horzLines:{visible:false} },
    rightPriceScale: { visible:false },
    timeScale: { visible:false },
    crosshair: { mode: LightweightCharts.CrosshairMode.Hidden },
  });
  const series = chart.addCandlestickSeries({
    upColor:'#26a69a', downColor:'#ef5350',
    borderUpColor:'#26a69a', borderDownColor:'#ef5350',
    wickUpColor:'#26a69a', wickDownColor:'#ef5350',
  });
  const data = candles.map(c => ({
    time: c.t, open:c.o, high:c.h, low:c.l, close:c.c
  })).filter(d => d.open && d.close);
  series.setData(data);
  chart.timeScale().fitContent();
  return chart;
}

// ── 渲染卡片 ─────────────────────────────
function renderCards() {
  const grid    = document.getElementById('stockGrid');
  const list    = sortStocks(filterStocks());
  document.getElementById('matchCount').textContent = list.length;

  // 銷毀舊迷你圖
  Object.values(miniCharts).forEach(c => c.remove());
  miniCharts = {};

  if (!list.length) {
    grid.innerHTML = `<div class="empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <p>沒有符合條件的股票</p></div>`;
    return;
  }

  grid.innerHTML = list.map((s, idx) => {
    const pct = s.change_pct;
    const cls = pct > 0 ? 'up' : pct < 0 ? 'down' : 'flat';
    const sign= pct > 0 ? '+' : '';
    const flagsHtml = Object.entries(s.flags||{})
      .filter(([k,v]) => v && FLAG_LABELS[k])
      .slice(0, 5)
      .map(([k]) => {
        const [label, type] = FLAG_LABELS[k];
        return `<span class="flag-tag flag-${type}">${label}</span>`;
      }).join('');

    return `<div class="stock-card" data-idx="${idx}" onclick="openModal(${idx})">
      <div class="card-header">
        <div>
          <div class="card-symbol">${s.symbol.replace('.TW','').replace('.TWO','')}</div>
          <div class="card-name">${s.name}</div>
        </div>
        <div class="card-price">
          <div class="card-close ${cls}">${s.last_close ?? '-'}</div>
          <div class="card-change ${cls}">${sign}${pct != null ? pct.toFixed(2)+'%' : '-'}</div>
        </div>
      </div>
      <div class="card-chart" id="mini-${idx}"></div>
      <div class="card-flags">${flagsHtml}</div>
    </div>`;
  }).join('');

  // 繪製迷你圖（用 requestAnimationFrame 等 DOM 就緒）
  requestAnimationFrame(() => {
    list.forEach((s, idx) => {
      const el = document.getElementById(`mini-${idx}`);
      if (el && s.candles?.length) {
        miniCharts[idx] = renderMiniChart(el, s.candles);
      }
    });
  });
}

// ── Modal 大圖 ────────────────────────────
let modalChart = null;
function openModal(idx) {
  const list = sortStocks(filterStocks());
  const s = list[idx];
  if (!s) return;

  document.getElementById('mSymbol').textContent = s.symbol.replace('.TW','').replace('.TWO','');
  document.getElementById('mName').textContent   = s.name;

  // 繪製大 K 線圖
  const el = document.getElementById('modalChart');
  el.innerHTML = '';
  if (modalChart) { try { modalChart.remove(); } catch(e){} }

  modalChart = LightweightCharts.createChart(el, {
    width:  el.clientWidth || 840,
    height: 420,
    layout: { background:{color:'#141720'}, textColor:'#8892aa' },
    grid:   { vertLines:{color:'#1c2030'}, horzLines:{color:'#1c2030'} },
    rightPriceScale: { borderColor:'#252a3a' },
    timeScale: { borderColor:'#252a3a', timeVisible:true },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  });

  const candles = (s.candles||[]).filter(c=>c.o&&c.c);

  // K 棒
  const cSeries = modalChart.addCandlestickSeries({
    upColor:'#26a69a', downColor:'#ef5350',
    borderUpColor:'#26a69a', borderDownColor:'#ef5350',
    wickUpColor:'#26a69a', wickDownColor:'#ef5350',
  });
  cSeries.setData(candles.map(c=>({time:c.t,open:c.o,high:c.h,low:c.l,close:c.c})));

  // MA5
  const ma5 = modalChart.addLineSeries({ color:'#f0b840', lineWidth:1, title:'MA5' });
  ma5.setData(candles.filter(c=>c.ma5).map(c=>({time:c.t,value:c.ma5})));

  // MA20
  const ma20 = modalChart.addLineSeries({ color:'#4f8ef7', lineWidth:1, title:'MA20' });
  ma20.setData(candles.filter(c=>c.ma20).map(c=>({time:c.t,value:c.ma20})));

  // MA60
  const ma60 = modalChart.addLineSeries({ color:'#b060f0', lineWidth:1, title:'MA60' });
  ma60.setData(candles.filter(c=>c.ma60).map(c=>({time:c.t,value:c.ma60})));

  // 布林通道（上下軌）
  const bbU = modalChart.addLineSeries({ color:'rgba(240,184,64,.35)', lineWidth:1, lineStyle:2, title:'BB上' });
  const bbL = modalChart.addLineSeries({ color:'rgba(240,184,64,.35)', lineWidth:1, lineStyle:2, title:'BB下' });
  bbU.setData(candles.filter(c=>c.bb_u).map(c=>({time:c.t,value:c.bb_u})));
  bbL.setData(candles.filter(c=>c.bb_l).map(c=>({time:c.t,value:c.bb_l})));

  modalChart.timeScale().fitContent();

  // 統計數字
  const last = candles[candles.length-1] || {};
  const pct  = s.change_pct;
  const sign = pct > 0 ? '+' : '';
  const cls  = pct > 0 ? 'up' : pct < 0 ? 'down' : 'flat';
  document.getElementById('modalStats').innerHTML = `
    <div class="stat-box"><div class="stat-label">收盤價</div><div class="stat-value ${cls}">${s.last_close ?? '-'}</div></div>
    <div class="stat-box"><div class="stat-label">漲跌幅</div><div class="stat-value ${cls}">${sign}${pct!=null?pct.toFixed(2)+'%':'-'}</div></div>
    <div class="stat-box"><div class="stat-label">RSI(14)</div><div class="stat-value">${last.rsi != null ? last.rsi.toFixed(1) : '-'}</div></div>
    <div class="stat-box"><div class="stat-label">MACD</div><div class="stat-value">${last.macd != null ? last.macd.toFixed(3) : '-'}</div></div>
    <div class="stat-box"><div class="stat-label">MA20</div><div class="stat-value">${last.ma20 ?? '-'}</div></div>
    <div class="stat-box"><div class="stat-label">MA60</div><div class="stat-value">${last.ma60 ?? '-'}</div></div>
    <div class="stat-box"><div class="stat-label">布林上軌</div><div class="stat-value">${last.bb_u != null ? (+last.bb_u).toFixed(2) : '-'}</div></div>
    <div class="stat-box"><div class="stat-label">布林下軌</div><div class="stat-value">${last.bb_l != null ? (+last.bb_l).toFixed(2) : '-'}</div></div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
});
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

// ── 排序按鈕 ─────────────────────────────
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    sortMode = btn.dataset.sort;
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderCards();
  });
});

// ── 條件勾選 ─────────────────────────────
document.querySelectorAll('.filter-item input[type=checkbox]').forEach(cb => {
  cb.addEventListener('change', renderCards);
});

document.getElementById('resetBtn').addEventListener('click', () => {
  document.querySelectorAll('.filter-item input[type=checkbox]').forEach(cb => cb.checked=false);
  renderCards();
});

// ── 啟動 ─────────────────────────────────
loadData();
</script>
</body>
</html>
