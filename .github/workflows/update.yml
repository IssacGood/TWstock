name: 每日台股全量資料更新

on:
  schedule:
    - cron: '30 10 * * 1-5'   # 台灣時間 18:30，週一到週五
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-A:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install yfinance pandas twstock
      - run: python scripts/fetch_data.py --batch A
      - uses: actions/upload-artifact@v4
        with:
          name: batch-A
          path: data/stocks_A.json

  fetch-B:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install yfinance pandas twstock
      - run: python scripts/fetch_data.py --batch B
      - uses: actions/upload-artifact@v4
        with:
          name: batch-B
          path: data/stocks_B.json

  fetch-C:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install yfinance pandas twstock
      - run: python scripts/fetch_data.py --batch C
      - uses: actions/upload-artifact@v4
        with:
          name: batch-C
          path: data/stocks_C.json

  merge-and-commit:
    runs-on: ubuntu-latest
    needs: [fetch-A, fetch-B, fetch-C]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with: { name: batch-A, path: data }
      - uses: actions/download-artifact@v4
        with: { name: batch-B, path: data }
      - uses: actions/download-artifact@v4
        with: { name: batch-C, path: data }

      - name: 確認檔案與大小
        run: ls -lh data/

      - name: 合併產生 stocks.json（index）
        run: python scripts/merge_data.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 加入 index + 三批 K棒檔
          git add data/stocks.json data/stocks_A.json data/stocks_B.json data/stocks_C.json
          git diff --staged --quiet || git commit -m "chore: update all stocks $(date +'%Y-%m-%d %H:%M') UTC"
          git push
