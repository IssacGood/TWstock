name: 每日台股全量資料更新

on:
  schedule:
    # 台灣時間 18:30（UTC 10:30），週一到週五
    - cron: '30 10 * * 1-5'
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: write

jobs:
  # ── 三批平行抓取 ─────────────────────────────────────────
  fetch-A:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install yfinance pandas twstock
      - run: python scripts/fetch_data.py --batch A
      - uses: actions/upload-artifact@v4
        with:
          name: batch-A
          path: data/stocks_A.json
          retention-days: 1

  fetch-B:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install yfinance pandas twstock
      - run: python scripts/fetch_data.py --batch B
      - uses: actions/upload-artifact@v4
        with:
          name: batch-B
          path: data/stocks_B.json
          retention-days: 1

  fetch-C:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install yfinance pandas twstock
      - run: python scripts/fetch_data.py --batch C
      - uses: actions/upload-artifact@v4
        with:
          name: batch-C
          path: data/stocks_C.json
          retention-days: 1

  # ── 等三批都完成後合併並 commit ──────────────────────────
  merge-and-commit:
    runs-on: ubuntu-latest
    needs: [fetch-A, fetch-B, fetch-C]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install twstock

      - uses: actions/download-artifact@v4
        with: { name: batch-A, path: data }
      - uses: actions/download-artifact@v4
        with: { name: batch-B, path: data }
      - uses: actions/download-artifact@v4
        with: { name: batch-C, path: data }

      - name: 合併三批資料
        run: python scripts/fetch_data.py --merge

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json
          git diff --staged --quiet || git commit -m "chore: update all stocks $(date +'%Y-%m-%d %H:%M') UTC"
          git push
