<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI選股 — TWSTOCK</title>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0d0f14;--bg2:#141720;--bg3:#1c2030;--border:#252a3a;--accent:#00c896;--accent2:#4f8ef7;--gold:#f0b840;--text:#e8eaf0;--text2:#8892aa;--text3:#55607a;--up:#e84040;--down:#28a745;--font:'Noto Sans TC',sans-serif;--mono:'JetBrains Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font)}

/* ── Topbar（與 index.html 統一，置中） ── */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;position:sticky;top:0;z-index:100;gap:8px}
.topbar-logo{font-family:var(--mono);font-weight:600;font-size:15px;color:var(--accent);letter-spacing:2px;justify-self:start}
.topbar-nav{display:flex;gap:2px;justify-self:center}
.topbar-nav a{color:var(--text2);text-decoration:none;font-size:13px;padding:4px 10px;border-radius:6px;white-space:nowrap;transition:all .15s}
.topbar-nav a:hover{color:var(--text);background:var(--bg3)}
.topbar-nav a.active{color:var(--accent);background:rgba(0,200,150,.1)}

.container{padding:24px 16px;max-width:1100px;margin:0 auto}
h1{font-size:20px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.subtitle{font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.7}

.strategy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:28px}
.strategy-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;position:relative}
.strategy-card:hover{border-color:var(--accent2);transform:translateY(-2px)}
.strategy-card.active{border-color:var(--accent);background:rgba(0,200,150,.06)}
.strategy-card .check{position:absolute;top:12px;right:12px;width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s}
.strategy-card.active .check{background:var(--accent);border-color:var(--accent);color:#0d0f14}
.strategy-icon{font-size:24px;margin-bottom:8px}
.strategy-name{font-size:14px;font-weight:600;margin-bottom:4px}
.strategy-desc{font-size:12px;color:var(--text2);line-height:1.6}
.strategy-flags{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px}
.flag-chip{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

.run-btn{background:var(--accent);color:#0d0f14;font-weight:700;padding:12px 32px;border:none;border-radius:10px;font-size:15px;font-family:var(--font);cursor:pointer;transition:opacity .15s;margin-bottom:24px}
.run-btn:hover{opacity:.85}
.run-btn:disabled{opacity:.4;cursor:not-allowed}

.result-section{display:none}
.result-title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}

/* ★ 卡片可點擊看K線 */
.result-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;transition:all .2s;cursor:pointer}
.result-card:hover{border-color:var(--accent2);transform:translateY(-2px);box-shadow:0 4px 20px rgba(79,142,247,.15)}
.rc-top{display:flex;justify-content:space-between;margin-bottom:6px}
.rc-symbol{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--accent2)}
.rc-price{font-family:var(--mono);font-size:15px;font-weight:700}
.rc-name{font-size:12px;color:var(--text2);margin-bottom:4px}
.rc-click-hint{font-size:10px;color:var(--text3);margin-top:4px}
.rc-flags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.rc-flag{font-size:10px;padding:1px 6px;border-radius:3px}
.flag-bull{background:rgba(232,64,64,.15);color:var(--up)}
.flag-bear{background:rgba(40,167,69,.15);color:var(--down)}
.flag-info{background:rgba(79,142,247,.12);color:var(--accent2)}
.rc-score{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.score-bar{height:4px;background:var(--bg3);border-radius:2px;flex:1;overflow:hidden}
.score-fill{height:100%;background:var(--gold);border-radius:2px}

.no-result{text-align:center;padding:40px;color:var(--text3)}
.up{color:var(--up)}.down{color:var(--down)}.flat{color:var(--text2)}

/* ── K線 Modal（從 index.html 複製） ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;backdrop-filter:blur(4px);justify-content:center;align-items:flex-start;padding:24px 16px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:980px;padding:20px;position:relative;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal-close{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .15s;flex-shrink:0;align-self:flex-start}
.modal-close:hover{color:var(--text);border-color:var(--text2)}
.modal-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.modal-title-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.modal-symbol{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--accent2)}
.modal-name{font-size:14px;color:var(--text)}
.modal-group-tag{font-size:11px;color:var(--text3);border:1px solid var(--border);border-radius:4px;padding:1px 7px}
.modal-price-row{text-align:right}
.modal-price{font-family:var(--mono);font-size:24px;font-weight:700}
.modal-chg{font-family:var(--mono);font-size:13px;margin-top:2px}
.modal-links{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.modal-link{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--text2);text-decoration:none;border:1px solid var(--border);border-radius:5px;padding:3px 9px;transition:all .15s}
.modal-link:hover{color:var(--gold);border-color:var(--gold)}
.nav-arrows{display:flex;gap:4px;margin-left:auto}
.nav-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:4px 12px;cursor:pointer;font-size:13px;transition:all .15s;font-family:var(--font)}
.nav-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.chart-controls{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.range-btn{background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text3);font-size:11px;padding:3px 8px;cursor:pointer;transition:all .15s}
.range-btn.active,.range-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.chart-legend{display:flex;gap:10px;flex-wrap:wrap;margin-left:auto}
.legend-item{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text2)}
.legend-dot{width:16px;height:2px;border-radius:2px}
.ohlcv-bar{font-family:var(--mono);font-size:11px;color:var(--text2);padding:3px 0;min-height:20px;display:flex;gap:12px;flex-wrap:wrap}
.ohlcv-item span{color:var(--text3)}
.modal-chart{height:400px;border-radius:8px;overflow:hidden}
.chart-loading{display:flex;align-items:center;justify-content:center;height:400px;color:var(--text2);gap:10px;background:var(--bg3);border-radius:8px}
.spinner-sm{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.modal-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.stat-box{background:var(--bg3);border-radius:7px;padding:8px 12px}
.stat-label{font-size:10px;color:var(--text3);margin-bottom:3px}
.stat-value{font-family:var(--mono);font-size:13px;font-weight:600}
.kbd-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:8px}
kbd{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:10px;font-family:var(--mono)}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){.modal-stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">TWSTOCK</div>
  <nav class="topbar-nav">
    <a href="index.html">選股</a>
    <a href="watchlist.html">批量搜尋</a>
    <a href="favorites.html">我的最愛</a>
    <a href="market.html">大盤/期貨</a>
    <a href="stats.html">統計</a>
    <a href="sectors.html">類股排行</a>
    <a href="ai.html" class="active">AI選股</a>
    <a href="fear.html">貪婪指數</a>
    <a href="sinopac.html">永豐API</a>
  </nav>
  <div></div>
</div>

<div class="container">
  <h1>🤖 AI 選股</h1>
  <div class="subtitle">
    選擇一個或多個策略，系統自動組合條件篩選股票。<br>
    <b>點擊結果卡片可直接查看 K 線圖。</b>純技術面分析，僅供參考，不構成投資建議。
  </div>

  <div class="strategy-grid" id="strategyGrid"></div>
  <button class="run-btn" id="runBtn" onclick="runScreen()">🔍 開始篩選</button>

  <div class="result-section" id="resultSection">
    <div class="result-title" id="resultTitle"></div>
    <div class="result-grid" id="resultGrid"></div>
  </div>
</div>

<!-- K線 Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-top">
      <div>
        <div class="modal-title-row">
          <span class="modal-symbol" id="mSymbol"></span>
          <span class="modal-name" id="mName"></span>
          <span class="modal-group-tag" id="mGroup"></span>
        </div>
      </div>
      <div class="modal-price-row">
        <div class="modal-price" id="mPrice"></div>
        <div class="modal-chg" id="mChg"></div>
      </div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-links" id="mLinks"></div>
    <div class="chart-controls">
      <button class="range-btn" data-range="50">近50根</button>
      <button class="range-btn active" data-range="120">近6月</button>
      <button class="range-btn" data-range="250">近1年</button>
      <button class="range-btn" data-range="0">全部</button>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#f0b840"></div>MA5</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4f8ef7"></div>MA20</div>
        <div class="legend-item"><div class="legend-dot" style="background:#b060f0"></div>MA60</div>
        <div class="legend-item"><div class="legend-dot" style="border-top:1px dashed rgba(240,184,64,.5);width:16px;height:0"></div>BB</div>
      </div>
    </div>
    <div class="ohlcv-bar" id="ohlcvBar"><span style="color:var(--text3)">移動滑鼠到 K 棒上顯示 開/高/低/收/量</span></div>
    <div class="modal-chart" id="modalChart"><div class="chart-loading"><div class="spinner-sm"></div><span>載入中…</span></div></div>
    <div class="modal-stats" id="modalStats"></div>
    <div class="kbd-hint">鍵盤 <kbd>←</kbd> <kbd>→</kbd> 切換股票 · <kbd>Esc</kbd> 關閉</div>
  </div>
</div>

<script>
// ── 策略定義 ─────────────────────────────
const STRATEGIES=[
  {id:'momentum',icon:'🚀',name:'強勢動能',desc:'短線上漲動能強，多項技術指標同時看多',
   flags:['above_ma20','above_ma60','ma5_above_ma20','bullish_candle','macd_bullish'],bonus:['vol_surge','new_high_50']},
  {id:'reversal',icon:'🔄',name:'超賣反彈',desc:'股價大幅下跌後出現技術面超賣，可能出現反彈',
   flags:['rsi_oversold','near_bb_lower'],bonus:['bullish_candle','above_ma20']},
  {id:'golden',icon:'✨',name:'黃金交叉',desc:'MA5 剛剛向上穿越 MA20，短線趨勢轉強',
   flags:['golden_cross'],bonus:['vol_surge','above_ma60','macd_bullish']},
  {id:'lowprice',icon:'💰',name:'低價潛力股',desc:'股價低於 100 元，同時站上均線，具爆發潛力',
   flags:['price_u100','above_ma20'],bonus:['golden_cross','vol_surge','macd_bullish']},
  {id:'breakout',icon:'📈',name:'突破新高',desc:'近期創50日新高，且有成交量支撐',
   flags:['new_high_50','vol_surge'],bonus:['above_ma60','macd_bullish','bullish_candle']},
  {id:'stable',icon:'🏦',name:'穩健趨勢',desc:'股價站上 MA20 和 MA60，長短線趨勢同步向上',
   flags:['above_ma20','above_ma60','ma5_above_ma20'],bonus:['macd_bullish','bullish_candle']},
  {id:'turnover',icon:'🔥',name:'高周轉爆量',desc:'成交活躍、周轉率高，市場高度關注的標的',
   flags:['high_turnover','vol_surge'],bonus:['bullish_candle','golden_cross','above_ma20']},
];
const FLAG_LABELS={
  above_ma20:'站上MA20',above_ma60:'站上MA60',ma5_above_ma20:'MA5>MA20',
  golden_cross:'黃金交叉',rsi_oversold:'RSI超賣',macd_bullish:'MACD多頭',
  vol_surge:'爆量',near_bb_upper:'近BB上軌',near_bb_lower:'近BB下軌',
  bullish_candle:'收紅K',new_high_50:'50日新高',new_low_50:'50日新低',
  price_u100:'≤100元',price_u200:'≤200元',price_u500:'≤500元',
  high_turnover:'高周轉率',
};

let activeStrategies=new Set(), allStocks=[], showStocks=[];
let modalChartObj=null, currentIdx=-1;
const batchCache={};
const codeOnly=s=>s.replace('.TWO','').replace('.TW','');
const cnyesUrl=s=>`https://www.cnyes.com/twstock/${codeOnly(s)}`;

// 策略卡
document.getElementById('strategyGrid').innerHTML=STRATEGIES.map(s=>`
  <div class="strategy-card" id="sc-${s.id}" onclick="toggleStrategy('${s.id}')">
    <div class="check" id="chk-${s.id}"></div>
    <div class="strategy-icon">${s.icon}</div>
    <div class="strategy-name">${s.name}</div>
    <div class="strategy-desc">${s.desc}</div>
    <div class="strategy-flags">${s.flags.map(f=>`<span class="flag-chip">${FLAG_LABELS[f]||f}</span>`).join('')}</div>
  </div>`).join('');

function toggleStrategy(id){
  activeStrategies.has(id)?activeStrategies.delete(id):activeStrategies.add(id);
  document.getElementById('sc-'+id).classList.toggle('active',activeStrategies.has(id));
  document.getElementById('chk-'+id).textContent=activeStrategies.has(id)?'✓':'';
}

// ── 指標計算 ─────────────────────────────
function calcSMA(arr,n){return arr.map((_,i)=>i<n-1?null:arr.slice(i-n+1,i+1).reduce((a,b)=>a+b,0)/n);}
function calcEMA(arr,n){const k=2/(n+1);let e=[];arr.forEach((v,i)=>{e.push(i===0?v:v*k+e[i-1]*(1-k));});return e;}
function calcRSI(arr,n=14){const r=Array(arr.length).fill(null);for(let i=n;i<arr.length;i++){let g=0,l=0;for(let j=i-n+1;j<=i;j++){const d=arr[j]-arr[j-1];if(d>0)g+=d;else l-=d;}r[i]=l===0?100:100-100/(1+g/l);}return r;}
function calcMACD(arr){const line=calcEMA(arr,12).map((v,i)=>v-calcEMA(arr,26)[i]);return{line,sig:calcEMA(line,9)};}
function calcBB(arr,n=20){return arr.map((_,i)=>{if(i<n-1)return{u:null,l:null};const sl=arr.slice(i-n+1,i+1),mean=sl.reduce((a,b)=>a+b,0)/n,std=Math.sqrt(sl.reduce((a,b)=>a+(b-mean)**2,0)/n);return{u:mean+2*std,l:mean-2*std};});}

// ── 批次 K 棒快取 ─────────────────────────
async function loadBatch(batchId){
  if(batchCache[batchId]) return batchCache[batchId];
  const res=await fetch(`data/stocks_${batchId}.json?t=`+Date.now());
  const d=await res.json();
  const map=new Map();
  for(const s of(d.stocks||[])) map.set(s.symbol,s.candles||[]);
  batchCache[batchId]=map;
  return map;
}

// ── 篩選 ─────────────────────────────────
async function runScreen(){
  if(!activeStrategies.size){alert('請先選擇至少一個策略');return;}
  const btn=document.getElementById('runBtn');
  btn.disabled=true; btn.textContent='篩選中…';
  try{
    if(!allStocks.length){
      const res=await fetch('data/stocks.json?t='+Date.now());
      allStocks=(await res.json()).stocks||[];
    }
    const req=new Set(), bonus=new Set();
    [...activeStrategies].forEach(id=>{
      const s=STRATEGIES.find(x=>x.id===id);
      s?.flags.forEach(f=>req.add(f)); s?.bonus.forEach(f=>bonus.add(f));
    });
    let results=allStocks.filter(s=>[...req].every(f=>s.flags?.[f]));
    results=results.map(s=>({...s,score:[...bonus].filter(f=>s.flags?.[f]).length}))
      .sort((a,b)=>b.score-a.score||(b.chg||0)-(a.chg||0));
    showStocks=results.slice(0,15);

    document.getElementById('resultSection').style.display='block';
    document.getElementById('resultTitle').innerHTML=
      `篩選結果：<span style="color:var(--accent);font-size:22px">${showStocks.length}</span> 檔
       <span style="font-size:13px;color:var(--text2);margin-left:8px">（從 ${results.length} 檔中選出前 ${showStocks.length} 檔）・點擊卡片查看 K 線</span>`;

    if(!showStocks.length){
      document.getElementById('resultGrid').innerHTML='<div class="no-result">😢 沒有符合所有條件的股票<br>請嘗試減少策略數量</div>';
    } else {
      const maxScore=[...bonus].size||1;
      document.getElementById('resultGrid').innerHTML=showStocks.map((s,i)=>{
        const pct=s.chg,cls=pct>0?'up':pct<0?'down':'flat',sign=pct>0?'+':'';
        const fh=[...req,...bonus].filter(f=>s.flags?.[f]).map(f=>`<span class="rc-flag flag-bull">${FLAG_LABELS[f]||f}</span>`).join('');
        const sp=Math.round(s.score/maxScore*100);
        return`<div class="result-card" onclick="openModal(${i})">
          <div class="rc-top">
            <div><div class="rc-symbol">${codeOnly(s.symbol)}</div>
            <div class="rc-name">${s.name||''}${s.group?` · ${s.group}`:''}</div></div>
            <div style="text-align:right">
              <div class="rc-price ${cls}">${s.lc??'-'}</div>
              <div style="font-size:11px;font-family:var(--mono)" class="${cls}">${sign}${pct!=null?pct.toFixed(2)+'%':'-'}</div>
            </div>
          </div>
          <div class="rc-flags">${fh}</div>
          <div class="rc-score"><span>符合度</span><div class="score-bar"><div class="score-fill" style="width:${sp}%"></div></div><span>${sp}%</span></div>
          <div class="rc-click-hint">📊 點擊查看 K 線圖</div>
        </div>`;
      }).join('');
    }
  }catch(e){alert('載入失敗：'+e.message);}
  btn.disabled=false; btn.textContent='🔍 開始篩選';
}

// ── K線 Modal ────────────────────────────
async function openModal(idx){
  currentIdx=idx;
  const s=showStocks[idx]; if(!s) return;
  const code=codeOnly(s.symbol);
  const pct=s.chg,cls=pct>0?'up':pct<0?'down':'flat',sign=pct>0?'+':'';
  document.getElementById('mSymbol').textContent=code;
  document.getElementById('mName').textContent=s.name||'';
  document.getElementById('mGroup').textContent=s.group||'';
  document.getElementById('mPrice').className='modal-price '+cls;
  document.getElementById('mPrice').textContent=s.lc??'-';
  document.getElementById('mChg').className='modal-chg '+cls;
  document.getElementById('mChg').textContent=`${sign}${pct!=null?pct.toFixed(2)+'%':'-'}`;
  document.getElementById('mLinks').innerHTML=`
    <a class="modal-link" href="${cnyesUrl(s.symbol)}" target="_blank" rel="noopener">📰 鉅亨行情</a>
    <a class="modal-link" href="https://www.cnyes.com/twstock/${code}/news" target="_blank" rel="noopener">📰 新聞</a>
    <div class="nav-arrows">
      <button class="nav-btn" onclick="navigate(-1)">◀ 上一檔</button>
      <button class="nav-btn" onclick="navigate(1)">下一檔 ▶</button>
    </div>`;
  document.querySelectorAll('.range-btn').forEach(b=>b.classList.toggle('active',b.dataset.range==='120'));
  document.getElementById('modalStats').innerHTML='';
  document.getElementById('ohlcvBar').innerHTML='<span style="color:var(--text3)">移動滑鼠到 K 棒上</span>';
  document.getElementById('modalChart').innerHTML='<div class="chart-loading"><div class="spinner-sm"></div><span>載入 K 線資料…</span></div>';
  document.getElementById('modalOverlay').classList.add('open');
  try{
    const map=await loadBatch(s.batch||'A');
    const raw=map.get(s.symbol)||[];
    s._rawCandles=raw;
    await buildChart(s,raw,120);
  }catch(e){
    document.getElementById('modalChart').innerHTML='<div class="chart-loading" style="color:#e84040">⚠ K線載入失敗</div>';
  }
}

function navigate(dir){
  const next=currentIdx+dir;
  if(next>=0&&next<showStocks.length) openModal(next);
}

async function buildChart(stock,raw,range){
  if(!raw?.length){document.getElementById('modalChart').innerHTML='<div class="chart-loading" style="color:var(--text3)">無 K 線資料</div>';return;}
  let c=raw; if(range>0) c=c.slice(-range);
  const cl=c.map(x=>x[4]);
  const ma5=calcSMA(cl,5),ma20=calcSMA(cl,20),ma60=calcSMA(cl,60);
  const rsi14=calcRSI(cl,14);
  const{line:macdLine}=calcMACD(cl);
  const bb=calcBB(cl,20);

  const el=document.getElementById('modalChart'); el.innerHTML='';
  if(modalChartObj){try{modalChartObj.remove()}catch(e){}}
  modalChartObj=LightweightCharts.createChart(el,{
    width:el.clientWidth||900,height:400,
    layout:{background:{color:'#141720'},textColor:'#8892aa'},
    grid:{vertLines:{color:'#1c2030'},horzLines:{color:'#1c2030'}},
    rightPriceScale:{visible:false},
    leftPriceScale:{visible:true,borderColor:'#252a3a'},
    timeScale:{borderColor:'#252a3a',timeVisible:true,rightOffset:3},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
  });
  const cs=modalChartObj.addCandlestickSeries({upColor:'#e84040',downColor:'#28a745',borderUpColor:'#e84040',borderDownColor:'#28a745',wickUpColor:'#e84040',wickDownColor:'#28a745',priceScaleId:'left'});
  cs.setData(c.map(x=>({time:x[0],open:x[1],high:x[2],low:x[3],close:x[4]})));

  modalChartObj.subscribeCrosshairMove(p=>{
    if(!p.time){document.getElementById('ohlcvBar').innerHTML='<span style="color:var(--text3)">移動滑鼠到 K 棒上</span>';return;}
    const d=p.seriesData?.get(cs); if(!d) return;
    const vi=c.findIndex(x=>x[0]===p.time); const vol=vi>=0?c[vi][5]:'-';
    const oc=d.close>=d.open?'up':'down';
    document.getElementById('ohlcvBar').innerHTML=
      `<div class="ohlcv-item"><span>日期 </span>${p.time}</div>
       <div class="ohlcv-item"><span>開 </span><b class="${oc}">${d.open}</b></div>
       <div class="ohlcv-item"><span>高 </span><b style="color:var(--up)">${d.high}</b></div>
       <div class="ohlcv-item"><span>低 </span><b style="color:var(--down)">${d.low}</b></div>
       <div class="ohlcv-item"><span>收 </span><b class="${oc}">${d.close}</b></div>
       <div class="ohlcv-item"><span>量 </span>${typeof vol==='number'?vol.toLocaleString():vol}</div>`;
  });

  const addL=(color,data,title,style=0)=>{
    const s=modalChartObj.addLineSeries({color,lineWidth:1,title,lineStyle:style,priceScaleId:'left'});
    s.setData(data.filter(d=>d.value!=null));
  };
  addL('#f0b840',c.map((x,i)=>({time:x[0],value:ma5[i]})),'MA5');
  addL('#4f8ef7',c.map((x,i)=>({time:x[0],value:ma20[i]})),'MA20');
  addL('#b060f0',c.map((x,i)=>({time:x[0],value:ma60[i]})),'MA60');
  addL('rgba(240,184,64,.4)',c.map((x,i)=>({time:x[0],value:bb[i].u})),'BB上',2);
  addL('rgba(240,184,64,.4)',c.map((x,i)=>({time:x[0],value:bb[i].l})),'BB下',2);
  modalChartObj.timeScale().fitContent();

  const lc=cl[cl.length-1], lr=rsi14[rsi14.length-1], lm=macdLine[macdLine.length-1];
  const lma20=ma20[ma20.length-1], lma60=ma60[ma60.length-1], lbb=bb[bb.length-1];
  const pct=stock.chg, sign=pct>0?'+':'', cls=pct>0?'up':pct<0?'down':'flat';
  document.getElementById('modalStats').innerHTML=`
    <div class="stat-box"><div class="stat-label">收盤價</div><div class="stat-value ${cls}">${lc?.toFixed(2)??'-'}</div></div>
    <div class="stat-box"><div class="stat-label">漲跌幅</div><div class="stat-value ${cls}">${sign}${pct!=null?pct.toFixed(2)+'%':'-'}</div></div>
    <div class="stat-box"><div class="stat-label">RSI(14)</div><div class="stat-value">${lr!=null?lr.toFixed(1):'-'}</div></div>
    <div class="stat-box"><div class="stat-label">MACD</div><div class="stat-value">${lm!=null?lm.toFixed(3):'-'}</div></div>
    <div class="stat-box"><div class="stat-label">MA20</div><div class="stat-value">${lma20!=null?lma20.toFixed(2):'-'}</div></div>
    <div class="stat-box"><div class="stat-label">MA60</div><div class="stat-value">${lma60!=null?lma60.toFixed(2):'-'}</div></div>
    <div class="stat-box"><div class="stat-label">布林上軌</div><div class="stat-value">${lbb.u!=null?lbb.u.toFixed(2):'-'}</div></div>
    <div class="stat-box"><div class="stat-label">布林下軌</div><div class="stat-value">${lbb.l!=null?lbb.l.toFixed(2):'-'}</div></div>`;
  stock._rawCandles=raw;
}

// Range 切換
document.querySelector('.chart-controls').addEventListener('click',async e=>{
  const btn=e.target.closest('.range-btn'); if(!btn) return;
  document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const s=showStocks[currentIdx];
  if(s?._rawCandles) await buildChart(s,s._rawCandles,parseInt(btn.dataset.range));
});
document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('modalOverlay').classList.remove('open'));
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');});
document.addEventListener('keydown',e=>{
  if(!document.getElementById('modalOverlay').classList.contains('open')) return;
  if(e.key==='ArrowLeft') navigate(-1);
  if(e.key==='ArrowRight') navigate(1);
  if(e.key==='Escape') document.getElementById('modalOverlay').classList.remove('open');
});
</script>
</body>
</html>
