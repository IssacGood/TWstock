<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>貪婪指數 — TWSTOCK</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0d0f14;--bg2:#141720;--bg3:#1c2030;--border:#252a3a;--accent:#00c896;--text:#e8eaf0;--text2:#8892aa;--text3:#55607a;--font:'Noto Sans TC',sans-serif;--mono:'JetBrains Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;position:sticky;top:0;z-index:100;gap:8px}
.topbar-logo{font-family:var(--mono);font-weight:600;font-size:15px;color:var(--accent);letter-spacing:2px;justify-self:start}
.topbar-nav{display:flex;gap:2px;justify-self:center}
.topbar-nav a{color:var(--text2);text-decoration:none;font-size:13px;padding:4px 10px;border-radius:6px;transition:all .15s;white-space:nowrap}
.topbar-nav a:hover{color:var(--text);background:var(--bg3)}
.topbar-nav a.active{color:var(--accent);background:rgba(0,200,150,.1)}
.container{padding:20px 16px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab-btn{background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);padding:8px 16px;font-size:13px;cursor:pointer;transition:all .15s}
.tab-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,200,150,.08)}
.tab-content{display:none}.tab-content.active{display:block}
.iframe-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.iframe-wrap iframe{width:100%;height:calc(100vh - 160px);border:none;display:block}
.link-hint{font-size:12px;color:var(--text3);padding:12px 16px;text-align:center}
.link-hint a{color:var(--accent2)}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">TWSTOCK</div>
  <nav class="topbar-nav">
    <a href="index.html">選股</a>
    <a href="watchlist.html">批量搜尋</a>
    <a href="favorites.html">我的最愛</a>
    <a href="market.html">大盤/期貨</a>
    <a href="stats.html">統計</a>
    <a href="sectors.html">類股排行</a>
    <a href="ai.html">AI選股</a>
    <a href="fear.html" class="active">貪婪指數</a>
  </nav>
  <div></div>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('cnn',this)">🌐 CNN 恐懼&貪婪</button>
    <button class="tab-btn" onclick="switchTab('wantgoo',this)">🇹🇼 玩股網貪婪指數</button>
  </div>

  <div id="tab-cnn" class="tab-content active">
    <div class="iframe-wrap">
      <!-- CNN 不允許 iframe，改為連結按鈕 -->
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:400px;gap:16px">
        <div style="font-size:48px">😨😊</div>
        <div style="font-size:16px;color:var(--text2)">CNN 貪婪指數</div>
        <a href="https://edition.cnn.com/markets/fear-and-greed" target="_blank"
           style="background:var(--accent);color:#0d0f14;font-weight:700;padding:12px 28px;border-radius:8px;text-decoration:none;font-size:15px">
          🔗 前往 CNN Fear & Greed Index
        </a>
        <div style="font-size:12px;color:var(--text3)">CNN 禁止嵌入，請點連結開啟</div>
      </div>
    </div>
  </div>

  <div id="tab-wantgoo" class="tab-content">
    <div class="iframe-wrap">
      <iframe src="https://www.wantgoo.com/global/macroeconomics/fearandgreed"
              title="玩股網貪婪指數"
              sandbox="allow-scripts allow-same-origin allow-forms"
              loading="lazy">
      </iframe>
      <div class="link-hint">如無法顯示，請<a href="https://www.wantgoo.com/global/macroeconomics/fearandgreed" target="_blank">點此直接前往</a></div>
    </div>
  </div>
</div>

<script>
function switchTab(id, btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}
</script>
</body>
</html>
