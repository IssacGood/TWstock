<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>統計 — TWSTOCK</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0d0f14;--bg2:#141720;--bg3:#1c2030;--border:#252a3a;--accent:#00c896;--accent2:#4f8ef7;--text:#e8eaf0;--text2:#8892aa;--text3:#55607a;--up:#e84040;--down:#28a745;--font:'Noto Sans TC',sans-serif;--mono:'JetBrains Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font)}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;position:sticky;top:0;z-index:100;gap:8px}
.topbar-logo{font-family:var(--mono);font-weight:600;font-size:15px;color:var(--accent);letter-spacing:2px;justify-self:start}
.topbar-nav{display:flex;gap:2px;justify-self:center}
.topbar-nav a{color:var(--text2);text-decoration:none;font-size:13px;padding:4px 10px;border-radius:6px;transition:all .15s;white-space:nowrap}
.topbar-nav a:hover{color:var(--text);background:var(--bg3)}
.topbar-nav a.active{color:var(--accent);background:rgba(0,200,150,.1)}
.container{padding:20px 16px;max-width:1200px;margin:0 auto}
.section-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';width:3px;height:13px;background:var(--accent);border-radius:2px;display:block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px}
.summary-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.sbox{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.sbox-label{font-size:10px;color:var(--text3);margin-bottom:4px}
.sbox-value{font-family:var(--mono);font-size:18px;font-weight:700}
.loading-msg{text-align:center;padding:40px;color:var(--text3)}
.progress-bar{background:var(--bg3);border-radius:4px;height:6px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}
@media(max-width:700px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">TWSTOCK</div>
  <nav class="topbar-nav">
    <a href="index.html">選股</a>
    <a href="watchlist.html">批量搜尋</a>
    <a href="favorites.html">我的最愛</a>
    <a href="market.html">大盤/期貨</a>
    <a href="stats.html" class="active">統計</a>
    <a href="sectors.html">類股排行</a>
    <a href="ai.html">AI選股</a>
    <a href="fear.html">貪婪指數</a>
    <a href="sinopac.html">永豐API</a>
  </nav>
  <div></div>
</div>

<div class="container">
  <div id="mainContent">
    <div class="loading-msg">
      <div>⏳ 計算統計資料中…</div>
      <div style="font-size:12px;color:var(--text3);margin-top:6px">正在從 K 線資料計算近一個月每日漲跌統計</div>
      <div class="progress-bar" style="max-width:300px;margin:12px auto 0"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </div>
</div>

<script>
Chart.defaults.color='#8892aa';
Chart.defaults.borderColor='#1c2030';

async function loadAndRender(){
  // 載入 index
  const idxRes=await fetch('data/stocks.json?t='+Date.now());
  const idx=await idxRes.json();
  const stocks=idx.stocks||[];

  // 今日統計（用 chg 欄位）
  const todayUp=stocks.filter(s=>s.chg>0).length;
  const todayDown=stocks.filter(s=>s.chg<0).length;
  const todayFlat=stocks.filter(s=>!s.chg||s.chg===0).length;
  const avgChg=(stocks.reduce((a,s)=>a+(s.chg||0),0)/stocks.length).toFixed(2);

  // 股價分佈
  const priceRanges={
    '100以下':stocks.filter(s=>s.lc&&s.lc<100).length,
    '100~200':stocks.filter(s=>s.lc&&s.lc>=100&&s.lc<200).length,
    '200~500':stocks.filter(s=>s.lc&&s.lc>=200&&s.lc<500).length,
    '500~1000':stocks.filter(s=>s.lc&&s.lc>=500&&s.lc<1000).length,
    '1000以上':stocks.filter(s=>s.lc&&s.lc>=1000).length,
  };

  // 分批載入 K 棒計算近 30 日每日漲跌數
  const dailyStats={};  // date -> {up, down, flat}

  const batches=['A','B','C'];
  for(let bi=0; bi<batches.length; bi++){
    const bid=batches[bi];
    document.getElementById('progressFill').style.width=`${(bi/3*100).toFixed(0)}%`;
    try{
      const res=await fetch(`data/stocks_${bid}.json?t=`+Date.now());
      const bdata=await res.json();
      for(const s of (bdata.stocks||[])){
        const c=s.candles||[];
        // 取最近 30 根
        const recent=c.slice(-30);
        for(let i=1;i<recent.length;i++){
          const date=recent[i][0];
          const close=recent[i][4];
          const prevClose=recent[i-1][4];
          if(!close||!prevClose) continue;
          const chg=close-prevClose;
          if(!dailyStats[date]) dailyStats[date]={up:0,down:0,flat:0};
          if(chg>0) dailyStats[date].up++;
          else if(chg<0) dailyStats[date].down++;
          else dailyStats[date].flat++;
        }
      }
    }catch(e){ console.log('batch',bid,'failed',e); }
  }
  document.getElementById('progressFill').style.width='100%';

  // 整理每日資料（取最近30天）
  const sortedDates=Object.keys(dailyStats).sort().slice(-30);
  const dailyUp=sortedDates.map(d=>dailyStats[d].up);
  const dailyDown=sortedDates.map(d=>dailyStats[d].down);

  // ★ 標籤：週五加 (五) 並用不同顏色
  const dailyLabels=sortedDates.map(d=>{
    const day=new Date(d).getDay(); // 0=日,1=一...5=五
    const mmdd=d.slice(5);
    if(day===5) return mmdd+'(五)';
    if(day===1) return mmdd+'(一)';
    return mmdd;
  });
  // 週五的點用金色標示
  const pointColors=sortedDates.map(d=>{
    const day=new Date(d).getDay();
    return day===5?'#f0b840':day===1?'rgba(79,142,247,0.8)':'rgba(232,64,64,0.6)';
  });
  const pointColorsDown=sortedDates.map(d=>{
    const day=new Date(d).getDay();
    return day===5?'#f0b840':day===1?'rgba(79,142,247,0.8)':'rgba(40,167,69,0.6)';
  });

  // 渲染
  document.getElementById('mainContent').innerHTML=`
    <div class="section-title">今日市場概況</div>
    <div class="summary-row">
      <div class="sbox"><div class="sbox-label">總檔數</div><div class="sbox-value" style="color:var(--accent2)">${stocks.length}</div></div>
      <div class="sbox"><div class="sbox-label">上漲</div><div class="sbox-value" style="color:var(--up)">${todayUp}</div></div>
      <div class="sbox"><div class="sbox-label">下跌</div><div class="sbox-value" style="color:var(--down)">${todayDown}</div></div>
      <div class="sbox"><div class="sbox-label">平盤</div><div class="sbox-value" style="color:var(--text2)">${todayFlat}</div></div>
      <div class="sbox"><div class="sbox-label">漲跌比</div><div class="sbox-value" style="color:${todayUp>todayDown?'var(--up)':'var(--down)'}">${(todayUp/Math.max(todayDown,1)).toFixed(2)}</div></div>
      <div class="sbox"><div class="sbox-label">平均漲跌%</div><div class="sbox-value" style="color:${avgChg>0?'var(--up)':'var(--down)'}">${avgChg>0?'+':''}${avgChg}%</div></div>
    </div>

    <div class="card" style="margin-bottom:20px">
      <div class="section-title" style="display:flex;align-items:center;gap:12px">
        近一個月每日漲跌股票數
        <span style="font-size:11px;color:var(--text3);font-weight:400;display:flex;gap:10px;margin-left:auto">
          <span style="color:#f0b840">● 週五</span>
          <span style="color:#4f8ef7">● 週一</span>
        </span>
      </div>
      <canvas id="dailyChart" height="80"></canvas>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="section-title">今日漲跌分佈</div>
        <canvas id="updownChart" height="200"></canvas>
      </div>
      <div class="card">
        <div class="section-title">股價分佈</div>
        <canvas id="priceChart" height="200"></canvas>
      </div>
    </div>`;

  // 近一個月每日折線圖（週五金色標示，週一藍色）
  new Chart(document.getElementById('dailyChart'),{
    type:'line',
    data:{
      labels:dailyLabels,
      datasets:[
        {
          label:'上漲',data:dailyUp,
          borderColor:'#e84040',backgroundColor:'rgba(232,64,64,.08)',
          borderWidth:2,fill:false,tension:.3,
          pointRadius:sortedDates.map(d=>new Date(d).getDay()===5?7:3),
          pointBackgroundColor:pointColors,
          pointBorderColor:pointColors,
        },
        {
          label:'下跌',data:dailyDown,
          borderColor:'#28a745',backgroundColor:'rgba(40,167,69,.08)',
          borderWidth:2,fill:false,tension:.3,
          pointRadius:sortedDates.map(d=>new Date(d).getDay()===5?7:3),
          pointBackgroundColor:pointColorsDown,
          pointBorderColor:pointColorsDown,
        },
      ]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{labels:{color:'#8892aa',font:{size:12}}},
        tooltip:{
          callbacks:{
            title:ctx=>{
              const d=sortedDates[ctx[0].dataIndex];
              const day=['日','一','二','三','四','五','六'][new Date(d).getDay()];
              return `${d} (週${day})`;
            }
          }
        }
      },
      scales:{
        x:{
          ticks:{
            color:ctx=>{
              const d=sortedDates[ctx.index];
              if(!d) return '#8892aa';
              const day=new Date(d).getDay();
              if(day===5) return '#f0b840';   // 週五金色
              if(day===1) return '#4f8ef7';   // 週一藍色
              return '#8892aa';
            },
            font:{size:10},
            maxRotation:45
          },
          grid:{color:'#1c2030'}
        },
        y:{ticks:{color:'#8892aa'},grid:{color:'#1c2030'}}
      }
    }
  });

  // 今日漲跌圓餅
  new Chart(document.getElementById('updownChart'),{
    type:'doughnut',
    data:{
      labels:['上漲','下跌','平盤'],
      datasets:[{data:[todayUp,todayDown,todayFlat],backgroundColor:['#e84040','#28a745','#4f8ef7'],borderWidth:0}]
    },
    options:{plugins:{legend:{labels:{color:'#8892aa'}}},cutout:'60%'}
  });

  // 股價分佈長條
  new Chart(document.getElementById('priceChart'),{
    type:'bar',
    data:{
      labels:Object.keys(priceRanges),
      datasets:[{label:'檔數',data:Object.values(priceRanges),backgroundColor:'rgba(79,142,247,.7)',borderRadius:4}]
    },
    options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8892aa'}},y:{ticks:{color:'#8892aa'},grid:{color:'#1c2030'}}}}
  });
}

loadAndRender().catch(e=>{
  document.getElementById('mainContent').innerHTML=`<div class="loading-msg">⚠ 無法載入資料：${e.message}</div>`;
});
</script>
</body>
</html>
